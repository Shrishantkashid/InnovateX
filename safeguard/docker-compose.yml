version: '3.8'

services:
  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./apps/api:/app
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # Supabase local development is usually handled via the Supabase CLI, 
  # but we can add a placeholder if needed.
